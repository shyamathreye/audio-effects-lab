name: CI

# Type-check + production build on every PR into main, so a broken change
# can't be merged. (The Web Audio fixtures need a real browser, so they run
# in-app, not here; tsc + vite build catch type and build regressions.)
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
